name: Feature request
description: Suggest something xspec should do
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are considered case-by-case. `xspec` is solo-maintained
        and experimental — most features land via PR rather than backlog.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's currently hard or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed shape
      description: How would you like xspec to behave? Slash command sketch, agent prompt, runtime config, whatever fits.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today? What did you rule out?

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I'd open a PR if pointed at the right files
        - label: I'd help test once a draft exists
